<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamViewerアンケート - ログイン</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="container">
    <div class="login-card">
      <h1>TeamViewerアンケート</h1>
      <p class="subtitle">ログインしてアンケートに回答してください</p>
      
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="your.name@okijoh.co.jp"
            required
            autocomplete="email"
          >
        </div>
        
        <div class="form-group">
          <label for="password">パスワード</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="パスワードを入力"
            required
            autocomplete="current-password"
          >
        </div>
        
        <div id="error-message" class="error-message" role="alert" aria-live="polite"></div>
        
        <button type="submit" class="btn-primary">ログイン</button>
      </form>
    </div>
  </div>
  <script src="dist/login.js"></script>
</body>
</html>
