AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TeamViewer Survey Application - Serverless Backend

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Runtime: nodejs18.x
    Environment:
      Variables:
        SESSIONS_TABLE: !Ref SessionsTable
        RESPONSES_TABLE: !Ref ResponsesTable
        COMMON_PASSWORD: '{{resolve:ssm:teamviewer-survey-common-password:1}}'
        ADMIN_PASSWORD: '{{resolve:ssm:teamviewer-survey-admin-password:1}}'
        SURVEY_START_DATE: '2026-03-15'
        SURVEY_END_DATE: '2026-06-27'

Resources:
  # DynamoDB Tables
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: teamviewer-survey-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TeamViewerSurvey
        - Key: Environment
          Value: Production

  ResponsesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: teamviewer-survey-responses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TeamViewerSurvey
        - Key: Environment
          Value: Production

  # Lambda Functions (Placeholder - to be implemented in other tasks)
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/lambda/
      Handler: auth.handler
      Description: Authentication Lambda for TeamViewer Survey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          NODE_ENV: production

  SurveyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/lambda/
      Handler: survey.handler
      Description: Survey Lambda for TeamViewer Survey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ResponsesTable
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          NODE_ENV: production

  ReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/lambda/
      Handler: report.handler
      Description: Report Lambda for TeamViewer Survey
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ResponsesTable
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          NODE_ENV: production

  # API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: NONE
      # HTTPS通信の強制設定（要件: 7.1）
      EndpointConfiguration:
        Type: REGIONAL
      # セキュリティポリシーの設定
      Domain:
        SecurityPolicy: TLS_1_2
      # API Gatewayのデフォルト設定でHTTPSのみ許可
      # HTTPリクエストは自動的にHTTPSにリダイレクトされる

Outputs:
  SessionsTableName:
    Description: DynamoDB Sessions Table Name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${AWS::StackName}-SessionsTable'

  ResponsesTableName:
    Description: DynamoDB Responses Table Name
    Value: !Ref ResponsesTable
    Export:
      Name: !Sub '${AWS::StackName}-ResponsesTable'

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'
