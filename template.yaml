AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TeamViewer Survey Application - Serverless Backend

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs22.x
    Environment:
      Variables:
        SESSIONS_TABLE_NAME: !Ref SessionsTable
        RESPONSES_TABLE_NAME: !Ref ResponsesTable
        COMMON_PASSWORD_PARAM: '/teamviewer-survey/common-password'
        ADMIN_PASSWORD_PARAM: '/teamviewer-survey/admin-password'
        SURVEY_START_DATE: '2026-03-02'
        SURVEY_END_DATE: '2026-06-27'
        JWT_SECRET: 'teamviewer-survey-jwt-secret-key-2026'

Resources:
  # DynamoDB Tables
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: teamviewer-survey-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TeamViewerSurvey
        - Key: Environment
          Value: Production

  ResponsesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: teamviewer-survey-responses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TeamViewerSurvey
        - Key: Environment
          Value: Production

  # Lambda Functions
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda/auth.handler
      Description: Authentication Lambda for TeamViewer Survey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource:
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/teamviewer-survey/common-password'
              - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/teamviewer-survey/admin-password'
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'
      Environment:
        Variables:
          NODE_ENV: production
      Events:
        LoginApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /auth/login
            Method: POST

  SurveyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda/survey.handler
      Description: Survey Lambda for TeamViewer Survey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ResponsesTable
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'
      Environment:
        Variables:
          NODE_ENV: production
      Events:
        GetSurveyApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /survey
            Method: GET
        PostSurveyApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /survey
            Method: POST

  ReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: lambda/report.handler
      Description: Report Lambda for TeamViewer Survey (Admin Only)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ResponsesTable
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'
      Environment:
        Variables:
          NODE_ENV: production
      Events:
        GetReportApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /report
            Method: GET

  # API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: NONE
      # HTTPS通信の強制設定（要件: 7.1）
      EndpointConfiguration:
        Type: REGIONAL

  # CloudWatch Logs - ログ保持期間設定（要件: 10.4）
  AuthFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AuthFunction}'
      RetentionInDays: 30

  SurveyFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${SurveyFunction}'
      RetentionInDays: 30

  ReportFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ReportFunction}'
      RetentionInDays: 30

Outputs:
  SessionsTableName:
    Description: DynamoDB Sessions Table Name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${AWS::StackName}-SessionsTable'

  ResponsesTableName:
    Description: DynamoDB Responses Table Name
    Value: !Ref ResponsesTable
    Export:
      Name: !Sub '${AWS::StackName}-ResponsesTable'

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'
